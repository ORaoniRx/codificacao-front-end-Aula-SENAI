<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Audio e Video</title>
    <link rel="stylesheet" href="./css/index2.css">
</head>
<body>
    <header>
        <h1>Testando Audio e Videos</h1>

    <main>

            </video>
        </section>
    </main>
</body>
</html>
