<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores Aritiméticos</title>
</head>

<body>
    <h1>Exemplos com Math</h1>

    <p>digite um numero</p>
    <input type="number" id="numero">
    <button>Calcular</button>

    <h2>Resultados aqui</h2>
    <span id="abs"></span>
    <span id="cell"></span>
    <span id="floor"></span>
    <span id="round"></span>
    <span id="sqrt"></span>
    <span id="pow"></span>
    <span id="random"></span>

    <script>
        function calcular () {
            let num = Number(document.getElementById('numero').value);

            document.getElementById("abs").textContent = `Valor absoluto: ${Math.abs(num)}`;
            document.getElementById("cell").textContent = `Arredondado para cima: ${Math.cell(num)}`;
            document.getElementById("floor").textContent = `Arredondando para baixo: ${Math.floor(num)}`;
            document.getElementById("round").textContent = `Arredondado: ${Math.round(num)}`;
            document.getElementById("sqrt").textContent = `Raiz Quadrada: ${Math.sqrt(num)}`;
            document.getElementById("pow").textContent = `Elevado ao Quadrado: ${Math.pow(num, 2)}`;
            document.getElementById("random").textContent = `Número aleatório: ${Math.random(num)}`;

            
        }



    </script>

</body>
</html>
