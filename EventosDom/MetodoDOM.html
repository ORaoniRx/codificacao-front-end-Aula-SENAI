<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplos Metodo Dom</h1>

    <!-- exemplo de getElementById -->
    <button id="btnId">Clique para obter o ID</button>
    <div class="output" id="outputId">Usado para acessar um elemento pelo Id</div>

    <hr>

    <!-- Exemplo de getElementByClassName -->
    <button id="btnClass">clique para acessar a classe</button>
    <div class="output" id="outputClass">retorna uma coleção de elementos com a mesma classe</div>
    <div class="outputClas">Classe 1</div>
    <div class="outputClas">Classe 2</div>

    <hr>

    <!-- Exemplo de querySelector -->
    <button id="btnQuery">Clique para alterar o conteúdo com querySelector</button>
    <div class="output" id="outputquery">retorna o primeiro elemento que corresponde ao seletor do CSS</div>

    <hr>

    <!-- Exemplo de createElement e appendChild -->
    <button id="btnCreate">Clique para criar um novo elemento</button>
    <div class="output" id="outputCreate">cria um novo elemento no DOM</div>

    <hr>

    <!-- Exemplo de removerChild -->
    <button id="btnRemove">Clique para remover um elemento</button>
    <div class="output" id="outRemove">Remove um elemento DOM</div>
    <div id="tobeRemoved">Esse elemento é oque será removido</div>


    <script>
        //getElementById
        document.getElementById('btnId').addEventListener('click', function(){
            const element = document.getElementById('outputId')
            element.textContent = "Elemento acessado pelo ID com sucesso."
        });

        //getElementByClassName
        document.getElementById('btnClass').addEventListener('click', function(){
            const element = document.getElementsByClassName('outputClas');
            for (let i=0; i < element.length; i++) {
                element[i].textContent = "Clicasse no botão. Foi alterado com getElementByClassName"
            }
        });

        //QuerySelector
        document.getElementById('btnQuery').addEventListener('click', function(){
            const element = document.querySelector('#outputquery');
            element.textContent = "Clicasse no botão. Texto mexido com querySelector :)"
        });

        //createElement
        document.getElementById('btnCreate').addEventListener('click', function(){
            const newElement = document.createElement('div');
            newElement.textContent = "Novo elemento criado com createElement.";
            document.body.appendChild(newElement);
        });

        //removeChild
        document.getElementById('btnRemove').addEventListener('click', function(){
            const element = document.getElementById('tobeRemoved');
            element.parentNode.removeChild(element);
        });
    </script>

</body>
</html>
