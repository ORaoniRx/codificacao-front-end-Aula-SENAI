<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="container">
        <header class="header-content">
            <h1>Formulário de Cadastro</h1>
        </header>

        <main class="main-content">
            <div class="container-form">
                <form class="form-1" action="mailto:raoniramos100@gmail.com" method="post">
                    <div id="border-form">
                        <h4>Nome Completo:</h4>
                        <input type="text" name="Nome" placeholder="nome completo">
                        <h4>RG/CPF:</h4>
                        <input type="text" name="RG" placeholder="CPF/RG">
                        <h4>Pai:</h4>
                        <input type="text" name="Pai" placeholder="nome do pai">
                        <select id="selecao" name="pais">
                            <option>Brasil</option>
                            <option>Argentina</option>
                            <option>Bolivia</option>
                            <option>Uruguay</option>
                            <option>Chile</option>
                        </select>
                        <h4>Telefone:</h4>
                        <input type="text" name="telefone" placeholder="telefone">
                        <h4>Email:</h4>
                        <input type="email" name="email" placeholder="email">
                        <h4>Data de Nascimento:</h4>
                        <input type="date" name="nascimento" placeholder="data de nascimento">
                        <h4>Mãe:</h4>
                        <input type="text" name="mae" placeholder="nome da mãe">
                        <h4>Profissão:</h4>
                        <input type="text" name="profissao" placeholder="sua profissão">
                        <h4>Celular:</h4>
                        <input type="text" name="celular" placeholder="celular">

                        <div class="botoes">
                            <input type="submit" name="env" id="bot" value="cadastrar">
                        </div>


                    </div>

                    
                </form>
            </div>



        </main>
    </div>
</body>
</html>
